<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing Flow — AI Writing Assistant</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">Writing Flow</h1>
        <span class="badge">Beta</span>
      </div>
      <div class="header-right">
        <select id="provider-selector" class="select-control">
          <option value="azure">Azure Foundry</option>
          <option value="gemini">Google Gemini</option>
        </select>
        <select id="model-selector" class="select-control">
          <option value="dft-foundry-resource.gpt-5-mini">GPT-5 Mini</option>
        </select>
      </div>
    </header>

    <!-- Main -->
    <main class="main">
      <!-- Input Section -->
      <section class="input-section">
        <div class="input-box">
          <textarea 
            id="input-text" 
            class="textarea"
            placeholder="Type or paste your text here..."
            maxlength="200"
            rows="4"
            spellcheck="false"
          ></textarea>
          <div class="input-footer">
            <span class="hint">Example: "I want to going to the meeting tomorrow"</span>
            <span class="char-count" id="char-count">0/200</span>
          </div>
        </div>

        <!-- Style Selection -->
        <div class="style-bar">
          <div class="style-options">
            <label class="style-chip">
              <input type="checkbox" id="style-email" value="email">
              <span class="chip-content">
                <svg class="chip-icon" width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
                Email
              </span>
            </label>
            <label class="style-chip">
              <input type="checkbox" id="style-teams" value="teams" checked>
              <span class="chip-content">
                <svg class="chip-icon" width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/></svg>
                Teams
              </span>
            </label>
            <label class="style-chip">
              <input type="checkbox" id="style-speaking" value="speaking">
              <span class="chip-content">
                <svg class="chip-icon" width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd"/></svg>
                Speaking
              </span>
            </label>
          </div>
          <button id="rewrite-btn" class="btn-primary" disabled>
            <svg class="btn-primary-icon" width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            <span class="btn-text">Rewrite</span>
          </button>
        </div>
      </section>

      <!-- Results Section -->
      <section class="results-section" id="results-section">
        <!-- Email Card -->
        <article class="card" id="card-email" data-style="email">
          <div class="card-header">
            <div class="card-title">
              <svg class="card-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
              <span>Email</span>
            </div>
            <button class="btn-icon copy-btn" aria-label="Copy">
              <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
            </button>
          </div>
          <div class="card-body">
            <div class="loading-indicator hidden"><div class="spinner"></div><span>Generating...</span></div>
            <p class="rewrite-text"></p>
            <div class="error-message hidden"></div>
            <p class="placeholder-text">Professional email version</p>
          </div>
        </article>

        <!-- Teams Card -->
        <article class="card" id="card-teams" data-style="teams">
          <div class="card-header">
            <div class="card-title">
              <svg class="card-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/></svg>
              <span>Teams</span>
            </div>
            <button class="btn-icon copy-btn" aria-label="Copy">
              <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
            </button>
          </div>
          <div class="card-body">
            <div class="loading-indicator hidden"><div class="spinner"></div><span>Generating...</span></div>
            <p class="rewrite-text"></p>
            <div class="error-message hidden"></div>
            <p class="placeholder-text">Casual chat version</p>
          </div>
        </article>

        <!-- Speaking Card -->
        <article class="card" id="card-speaking" data-style="speaking">
          <div class="card-header">
            <div class="card-title">
              <svg class="card-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd"/></svg>
              <span>Speaking</span>
            </div>
            <div class="card-actions">
              <button class="btn-icon play-btn" aria-label="Play">
                <svg class="play-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
              </button>
              <button class="btn-icon copy-btn" aria-label="Copy">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
              </button>
            </div>
          </div>
          <div class="card-body">
            <div class="loading-indicator hidden"><div class="spinner"></div><span>Generating...</span></div>
            <p class="rewrite-text"></p>
            <div class="error-message hidden"></div>
            <p class="placeholder-text">Spoken version</p>
          </div>
        </article>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>Press <kbd>⌘</kbd>+<kbd>Enter</kbd> to rewrite</span>
    </footer>
  </div>

  <!-- Spell Suggestions - at body level for proper z-index -->
  <div class="spell-suggestions" id="spell-suggestions"></div>

  <script src="config.production.js"></script>
  <script src="spellcheck.js"></script>
  <script src="api-proxy.js"></script>
  <script src="app.js"></script>
</body>
</html>
