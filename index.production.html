<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" name="viewport"/>
  <title>flusynt — AI Writing Tool</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#3b82f6",
            "background-light": "#ffffff",
            "background-dark": "#0a0c10",
            "card-dark": "#1a1c23",
          },
          fontFamily: {
            display: ["Inter", "system-ui", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "12px",
          },
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body { font-family: 'Inter', sans-serif; }
      /* Prevent scroll jump when mobile keyboard opens */
      html, body {
        overflow-x: hidden;
        overscroll-behavior: none;
      }
      @supports (-webkit-touch-callout: none) {
        /* iOS specific: prevent zoom and scroll issues */
        body {
          -webkit-text-size-adjust: 100%;
        }
        textarea:focus {
          font-size: 16px; /* Prevents iOS zoom on focus */
        }
      }
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .dark .result-card {
      background: rgba(45, 48, 58, 0.5);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    .glow-logo {
      filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.6));
    }
    .input-glow:focus-within {
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.5), 0 0 30px rgba(59, 130, 246, 0.15);
    }
    .rewrite-btn {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .rewrite-btn:hover:not(:disabled) {
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
      transform: translateY(-1px);
    }
    .rewrite-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    @keyframes spell-check-cycle {
      0%, 4% { content: ""; }
      5% { content: "r"; } 6% { content: "re"; } 7% { content: "rec"; } 8% { content: "reci"; }
      9% { content: "recie"; } 10% { content: "reciev"; } 11% { content: "recieve"; }
      15% { content: "recieve"; } 16% { content: "receive"; } 24% { content: "receive"; }
      25% { content: "receiv"; } 26% { content: "recei"; } 27% { content: "rece"; }
      28% { content: "rec"; } 29% { content: "re"; } 30% { content: "r"; } 31% { content: ""; }
      32% { content: "d"; } 33% { content: "de"; } 34% { content: "def"; } 35% { content: "defi"; }
      36% { content: "defin"; } 37% { content: "defini"; } 38% { content: "definit"; }
      39% { content: "definitl"; } 40% { content: "definitly"; } 44% { content: "definitly"; }
      45% { content: "definitely"; } 53% { content: "definitely"; } 54% { content: "definitel"; }
      55% { content: "definite"; } 56% { content: "definit"; } 57% { content: "defini"; }
      58% { content: "defin"; } 59% { content: "defi"; } 60% { content: "def"; }
      61% { content: "de"; } 62% { content: "d"; } 63% { content: ""; }
      64% { content: "o"; } 65% { content: "oc"; } 66% { content: "occ"; } 67% { content: "occu"; }
      68% { content: "occur"; } 69% { content: "occure"; } 70% { content: "occured"; }
      74% { content: "occured"; } 75% { content: "occurred"; } 83% { content: "occurred"; }
      84% { content: "occurre"; } 85% { content: "occurr"; } 86% { content: "occur"; }
      87% { content: "occu"; } 88% { content: "occ"; } 89% { content: "oc"; }
      90% { content: "o"; } 91%, 100% { content: ""; }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .spell-animation::after {
      content: "";
      animation: spell-check-cycle 15s infinite;
    }
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background-color: #3b82f6;
      margin-left: 2px;
      vertical-align: middle;
      animation: cursor-blink 1s infinite;
    }
    .text-gradient-brand {
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    /* Style chip states - color coded */
    .style-chip { transition: all 0.2s; opacity: 0.5; }
    .style-chip.active { opacity: 1; }
    .style-chip:not(.active):hover { opacity: 0.8; }
    
    /* Active state enhancements */
    .style-chip-email.active {
      background: rgba(16, 185, 129, 0.3);
      border-color: rgba(16, 185, 129, 0.6);
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
    }
    .style-chip-teams.active {
      background: rgba(168, 85, 247, 0.3);
      border-color: rgba(168, 85, 247, 0.6);
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.3);
    }
    .style-chip-speaking.active {
      background: rgba(245, 158, 11, 0.3);
      border-color: rgba(245, 158, 11, 0.6);
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.3);
    }
    /* Loading spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Spell check popup */
    .spell-suggestions {
      display: none;
      position: fixed;
      background: linear-gradient(180deg, #1f1f23 0%, #18181b 100%);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 10px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 10px 20px -2px rgba(0, 0, 0, 0.4);
      min-width: 180px;
      max-width: 260px;
      overflow: hidden;
      z-index: 99999;
      flex-direction: column;
      backdrop-filter: blur(8px);
    }
    .spell-error {
      text-decoration: underline wavy #ef4444;
      text-decoration-skip-ink: none;
    }
    /* Hide cards by default, show when has content */
    .result-card.hidden { display: none; }
    /* Select dropdown styling */
    select {
      background-color: transparent;
    }
    select option {
      background-color: #1a1c23;
      color: #e2e8f0;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8 lg:py-12">
    <!-- Header -->
    <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 sm:mb-10 lg:mb-16 gap-4">
      <div class="flex items-center gap-3 sm:gap-6 lg:gap-10 flex-wrap">
        <div class="flex items-center gap-2 sm:gap-4 group cursor-pointer">
          <div class="relative w-8 h-8 sm:w-10 sm:h-10 lg:w-12 lg:h-12 flex items-center justify-center glow-logo transition-transform duration-500 group-hover:scale-110">
            <div class="absolute inset-0 bg-blue-500/20 blur-xl rounded-full"></div>
            <svg fill="none" class="w-8 h-8 sm:w-10 sm:h-10 lg:w-12 lg:h-12" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
              <rect fill="url(#grad1)" fill-opacity="0.9" height="18" rx="4" width="14" x="14" y="4"></rect>
              <rect fill="#3b82f6" height="10" rx="2" transform="rotate(-15 4 10)" width="10" x="4" y="10"></rect>
              <rect fill="#3b82f6" height="8" rx="2" transform="rotate(10 6 18)" width="8" x="6" y="18"></rect>
              <defs>
                <linearGradient gradientUnits="userSpaceOnUse" id="grad1" x1="14" x2="28" y1="4" y2="22">
                  <stop stop-color="#E9D5FF"></stop>
                  <stop offset="1" stop-color="#93C5FD"></stop>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1 class="text-xl sm:text-2xl lg:text-4xl font-black tracking-tighter text-slate-900 dark:text-white glow-logo">flusynt</h1>
        </div>
        <div class="hidden lg:flex items-center border-l border-white/10 pl-10 h-10">
          <div class="text-lg font-medium text-slate-400 flex items-center min-w-[200px]">
            <span class="spell-animation text-gradient-brand font-bold tracking-tight"></span><span class="cursor"></span>
          </div>
        </div>
        <span class="px-2 py-0.5 sm:px-3 sm:py-1 rounded-full text-[9px] sm:text-[11px] font-bold tracking-[0.2em] uppercase bg-blue-500/10 text-blue-400 border border-blue-500/20 shadow-sm">Beta</span>
      </div>
      
      <!-- Model Selector -->
      <div class="flex items-center gap-3 w-full sm:w-auto">
        <select id="provider-selector" class="hidden">
          <option value="azure">Azure Foundry</option>
          <option value="gemini">Google Gemini</option>
        </select>
        <div class="glass flex-1 sm:flex-none px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl sm:rounded-2xl flex items-center gap-2 sm:gap-3 hover:bg-white/10 transition-all border border-white/10 group">
          <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
          <select id="model-selector" class="flex-1 bg-transparent border-none text-xs sm:text-sm font-medium text-slate-300 focus:outline-none focus:ring-0 cursor-pointer pr-4 sm:pr-6 appearance-none" style="background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22><path fill=%22%2394a3b8%22 d=%22M2 4l4 4 4-4%22/></svg>'); background-repeat: no-repeat; background-position: right 0 center;">
            <option value="dft-foundry-resource.gpt-5-mini">GPT-5 Mini</option>
          </select>
        </div>
      </div>
    </header>

    <!-- Main Input -->
    <main class="relative mb-8 lg:mb-12">
      <div class="input-glow glass rounded-2xl lg:rounded-[2rem] p-2 transition-all duration-700">
        <textarea 
          id="input-text"
          class="w-full h-32 sm:h-40 lg:h-56 bg-transparent border-none focus:ring-0 text-base sm:text-lg lg:text-2xl placeholder-slate-500 dark:placeholder-slate-600 p-4 sm:p-6 lg:p-10 resize-none text-slate-800 dark:text-slate-200 leading-relaxed font-light"
          placeholder="Type or paste your text here..."
          maxlength="200"
          spellcheck="false"
        ></textarea>
        
        <div class="flex items-center justify-between p-4 lg:p-6 pt-0 gap-2 sm:gap-4">
          <!-- Style Chips (left) - color coded to match cards -->
          <div class="flex gap-1.5 sm:gap-2 lg:gap-2">
            <button id="style-email-btn" data-chip="email" class="style-chip style-chip-email bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 px-3 sm:px-3 lg:px-6 py-2.5 sm:py-2 lg:py-3 rounded-xl sm:rounded-lg lg:rounded-xl text-[10px] sm:text-[10px] lg:text-sm font-semibold flex items-center justify-center gap-1.5 lg:gap-2">
              <span class="material-symbols-outlined text-base sm:text-sm lg:text-lg">mail</span>
              <span class="hidden lg:inline">Email</span>
            </button>
            <button id="style-teams-btn" data-chip="teams" class="style-chip style-chip-teams active bg-purple-500/10 border border-purple-500/30 text-purple-400 px-3 sm:px-3 lg:px-6 py-2.5 sm:py-2 lg:py-3 rounded-xl sm:rounded-lg lg:rounded-xl text-[10px] sm:text-[10px] lg:text-sm font-semibold flex items-center justify-center gap-1.5 lg:gap-2">
              <span class="material-symbols-outlined text-base sm:text-sm lg:text-lg">groups</span>
              <span class="hidden lg:inline">Teams</span>
            </button>
            <button id="style-speaking-btn" data-chip="speaking" class="style-chip style-chip-speaking bg-amber-500/10 border border-amber-500/30 text-amber-400 px-3 sm:px-3 lg:px-6 py-2.5 sm:py-2 lg:py-3 rounded-xl sm:rounded-lg lg:rounded-xl text-[10px] sm:text-[10px] lg:text-sm font-semibold flex items-center justify-center gap-1.5 lg:gap-2">
              <span class="material-symbols-outlined text-base sm:text-sm lg:text-lg">mic</span>
              <span class="hidden lg:inline">Speaking</span>
            </button>
          </div>
          
          <!-- Char count & Rewrite button (right) -->
          <div class="flex items-center gap-2 sm:gap-4 shrink-0">
            <span id="char-count" class="text-[10px] sm:text-xs text-slate-500 font-medium tabular-nums">0 / 200</span>
            <button id="rewrite-btn" class="rewrite-btn px-4 sm:px-6 lg:px-10 py-2.5 sm:py-3 lg:py-4 rounded-xl sm:rounded-2xl text-white font-bold flex items-center gap-1.5 sm:gap-2 lg:gap-3 shadow-xl text-xs sm:text-sm lg:text-base" disabled>
              <span class="material-symbols-outlined text-base sm:text-lg lg:text-xl">auto_fix_high</span>
              <span class="hidden sm:inline">Rewrite</span>
              <span class="sm:hidden">Go</span>
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Results Section -->
    <section id="results-section" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 lg:gap-8">
      <!-- Email Card -->
      <article class="result-card card p-4 sm:p-6 lg:p-8 rounded-2xl lg:rounded-[2rem] flex flex-col gap-3 sm:gap-4 lg:gap-6 group hover:border-emerald-500/40 transition-all duration-500" id="card-email" data-style="email" data-card="email">
        <div class="card-header flex items-center justify-between">
          <div class="card-title flex items-center gap-2 sm:gap-3 text-emerald-400">
            <div class="p-1.5 sm:p-2 bg-emerald-500/10 rounded-lg sm:rounded-xl">
              <span class="material-symbols-outlined text-lg sm:text-xl lg:text-2xl">mail</span>
            </div>
            <span class="text-base sm:text-lg lg:text-xl font-bold tracking-tight text-slate-900 dark:text-white">Email</span>
          </div>
          <button class="btn-icon copy-btn p-1.5 sm:p-2 rounded-lg sm:rounded-xl hover:bg-white/10 text-slate-400 transition-colors" aria-label="Copy">
            <span class="material-symbols-outlined text-base sm:text-lg lg:text-xl">content_copy</span>
          </button>
        </div>
        <div class="card-body flex-1">
          <div class="loading-indicator hidden flex items-center gap-3 text-slate-400">
            <div class="spinner"></div>
            <span class="text-sm">Generating...</span>
          </div>
          <p class="rewrite-text text-sm sm:text-base lg:text-lg leading-relaxed lg:leading-[1.85] font-normal text-slate-100 dark:text-white/95"></p>
          <div class="error-message hidden text-xs sm:text-sm text-red-400 bg-red-500/10 p-2 sm:p-3 rounded-lg sm:rounded-xl"></div>
          <p class="placeholder-text text-sm text-slate-500 italic">Professional email version</p>
        </div>
      </article>

      <!-- Teams Card -->
      <article class="result-card card p-4 sm:p-6 lg:p-8 rounded-2xl lg:rounded-[2rem] flex flex-col gap-3 sm:gap-4 lg:gap-6 group hover:border-purple-500/40 transition-all duration-500" id="card-teams" data-style="teams" data-card="teams">
        <div class="card-header flex items-center justify-between">
          <div class="card-title flex items-center gap-2 sm:gap-3 text-purple-400">
            <div class="p-1.5 sm:p-2 bg-purple-500/10 rounded-lg sm:rounded-xl">
              <span class="material-symbols-outlined text-lg sm:text-xl lg:text-2xl">groups</span>
            </div>
            <span class="text-base sm:text-lg lg:text-xl font-bold tracking-tight text-slate-900 dark:text-white">Teams</span>
          </div>
          <button class="btn-icon copy-btn p-1.5 sm:p-2 rounded-lg sm:rounded-xl hover:bg-white/10 text-slate-400 transition-colors" aria-label="Copy">
            <span class="material-symbols-outlined text-base sm:text-lg lg:text-xl">content_copy</span>
          </button>
        </div>
        <div class="card-body flex-1">
          <div class="loading-indicator hidden flex items-center gap-3 text-slate-400">
            <div class="spinner"></div>
            <span class="text-sm">Generating...</span>
          </div>
          <p class="rewrite-text text-sm sm:text-base lg:text-lg leading-relaxed lg:leading-[1.85] font-normal text-slate-100 dark:text-white/95"></p>
          <div class="error-message hidden text-xs sm:text-sm text-red-400 bg-red-500/10 p-2 sm:p-3 rounded-lg sm:rounded-xl"></div>
          <p class="placeholder-text text-sm text-slate-500 italic">Casual chat version</p>
        </div>
      </article>

      <!-- Speaking Card -->
      <article class="result-card card p-4 sm:p-6 lg:p-8 rounded-2xl lg:rounded-[2rem] flex flex-col gap-3 sm:gap-4 lg:gap-6 group hover:border-amber-500/40 transition-all duration-500 sm:col-span-2 lg:col-span-1" id="card-speaking" data-style="speaking" data-card="speaking">
        <div class="card-header flex items-center justify-between">
          <div class="card-title flex items-center gap-2 sm:gap-3 text-amber-400">
            <div class="p-1.5 sm:p-2 bg-amber-500/10 rounded-lg sm:rounded-xl">
              <span class="material-symbols-outlined text-lg sm:text-xl lg:text-2xl">mic</span>
            </div>
            <span class="text-base sm:text-lg lg:text-xl font-bold tracking-tight text-slate-900 dark:text-white">Speaking</span>
          </div>
          <div class="card-actions flex gap-1">
            <button class="btn-icon play-btn p-1.5 sm:p-2 rounded-lg sm:rounded-xl hover:bg-white/10 text-slate-400 transition-colors" aria-label="Play">
              <span class="material-symbols-outlined text-base sm:text-lg lg:text-xl play-icon">volume_up</span>
            </button>
            <button class="btn-icon copy-btn p-1.5 sm:p-2 rounded-lg sm:rounded-xl hover:bg-white/10 text-slate-400 transition-colors" aria-label="Copy">
              <span class="material-symbols-outlined text-base sm:text-lg lg:text-xl">content_copy</span>
            </button>
          </div>
        </div>
        <div class="card-body flex-1">
          <div class="loading-indicator hidden flex items-center gap-3 text-slate-400">
            <div class="spinner"></div>
            <span class="text-sm">Generating...</span>
          </div>
          <p class="rewrite-text text-sm sm:text-base lg:text-lg leading-relaxed lg:leading-[1.85] font-normal text-slate-100 dark:text-white/95"></p>
          <div class="error-message hidden text-xs sm:text-sm text-red-400 bg-red-500/10 p-2 sm:p-3 rounded-lg sm:rounded-xl"></div>
          <p class="placeholder-text text-sm text-slate-500 italic">Spoken version</p>
        </div>
      </article>
    </section>

    <!-- Footer -->
    <footer class="mt-8 lg:mt-12 text-center">
      <span class="text-[10px] sm:text-xs text-slate-500">
        <span class="sm:hidden">Press <kbd class="px-1.5 py-0.5 bg-white/5 rounded border border-white/10 text-slate-400">Go</kbd> to rewrite</span>
        <span class="hidden sm:inline">Press <kbd class="px-1.5 sm:px-2 py-0.5 sm:py-1 bg-white/5 rounded border border-white/10 text-slate-400">⌘</kbd> + <kbd class="px-1.5 sm:px-2 py-0.5 sm:py-1 bg-white/5 rounded border border-white/10 text-slate-400">Enter</kbd> to rewrite</span>
      </span>
    </footer>
  </div>

  <!-- Background glow -->
  <div class="fixed bottom-0 left-0 w-full h-[60vh] pointer-events-none overflow-hidden -z-10 opacity-40 dark:opacity-30">
    <div class="absolute -bottom-48 left-1/4 w-[1000px] h-[1000px] bg-blue-600/30 rounded-full blur-[160px]"></div>
    <div class="absolute -bottom-48 right-1/4 w-[1000px] h-[1000px] bg-purple-700/30 rounded-full blur-[160px]"></div>
  </div>

  <!-- Spell Suggestions Popup -->
  <div class="spell-suggestions" id="spell-suggestions"></div>

  <!-- Hidden checkboxes for compatibility with existing JS -->
  <div class="hidden">
    <input type="checkbox" id="style-email" value="email">
    <input type="checkbox" id="style-teams" value="teams" checked>
    <input type="checkbox" id="style-speaking" value="speaking">
  </div>

  <!-- Production scripts: config.production.js + api-proxy.js -->
  <script src="config.production.js"></script>
  <script src="spellcheck.js"></script>
  <script src="api-proxy.js"></script>
  <script src="app.js"></script>
  <script>
    // Sync style buttons with hidden checkboxes
    document.querySelectorAll('.style-chip').forEach(btn => {
      const style = btn.dataset.chip;
      const checkbox = document.getElementById(`style-${style}`);
      
      // Initialize button state from checkbox
      if (checkbox && checkbox.checked) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
      
      btn.addEventListener('click', () => {
        btn.classList.toggle('active');
        if (checkbox) {
          checkbox.checked = btn.classList.contains('active');
          checkbox.dispatchEvent(new Event('change', { bubbles: true }));
        }
      });
    });

    // Fix select styling for dark mode
    document.querySelectorAll('select option').forEach(opt => {
      opt.style.backgroundColor = '#1a1c23';
      opt.style.color = '#e2e8f0';
    });

    // Fix iOS scroll jump when focusing textarea
    const textarea = document.getElementById('input-text');
    if (textarea && window.visualViewport) {
      // Use visualViewport API to handle keyboard
      const inputBox = textarea.closest('.input-glow');
      
      window.visualViewport.addEventListener('resize', () => {
        // When keyboard appears, visualViewport height decreases
        const keyboardHeight = window.innerHeight - window.visualViewport.height;
        if (keyboardHeight > 100) {
          // Keyboard is open - add padding to prevent overlap
          document.body.style.paddingBottom = keyboardHeight + 'px';
          // Scroll textarea into view
          setTimeout(() => {
            textarea.scrollIntoView({ block: 'center' });
          }, 50);
        } else {
          // Keyboard is closed
          document.body.style.paddingBottom = '0';
        }
      });
    }
  </script>
</body>
</html>
